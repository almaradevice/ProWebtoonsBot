<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NimeScans Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-button-color: #248bed;
            --tg-theme-button-text-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .user-card {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--tg-theme-button-color);
            margin-bottom: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }

        button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .status {
            font-size: 14px;
            margin-top: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar" id="user-avatar">?</div>
        <h2 id="welcome-msg">Halo, Pengguna!</h2>
        
        <div class="user-card">
            <p>Selamat datang di <strong>NimeScans Mini App</strong>.</p>
            <p id="user-detail">Mengambil data Telegram...</p>
        </div>

        <button id="main-btn">Kirim Pesan ke Bot</button>
        <button id="close-btn" style="background-color: #e53935;">Tutup Aplikasi</button>

        <div class="status" id="debug-info">
            Versi SDK: <span id="sdk-ver"></span>
        </div>
    </div>

    <script>
        // Inisialisasi Telegram WebApp
        const tg = window.Telegram.WebApp;

        // Beritahu Telegram bahwa Mini App sudah siap ditampilkan
        tg.ready();
        tg.expand(); // Membuka aplikasi dalam mode layar penuh

        // Menampilkan data user dari Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcome-msg').innerText = `Halo, ${user.first_name}!`;
            document.getElementById('user-detail').innerText = `Username: @${user.username || 'n/a'}\nID: ${user.id}`;
            document.getElementById('user-avatar').innerText = user.first_name.charAt(0);
        }

        document.getElementById('sdk-ver').innerText = tg.version;

        // Logika Tombol Utama (Main Button di bagian bawah UI Telegram)
        tg.MainButton.setText("KONFIRMASI").show();
        tg.MainButton.onClick(() => {
            tg.sendData("Konfirmasi dari Mini App"); // Mengirim data kembali ke bot
        });

        // Tombol di dalam HTML
        document.getElementById('main-btn').onclick = () => {
            tg.showAlert("Fitur ini akan segera hadir!");
        };

        document.getElementById('close-btn').onclick = () => {
            tg.close(); // Menutup Mini App
        };

        // Menyesuaikan warna tema secara otomatis
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.backgroundColor);
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.textColor);
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.buttonColor);
        document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.buttonTextColor);
    </script>
</body>
</html>
