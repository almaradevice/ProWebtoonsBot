        // --- 2. CORE ENGINE (genUI) ---
        function genUI(tag, props = {}) {
            const isSVG = tag === 'svg' || ['path', 'circle', 'rect', 'line', 'polyline', 'polygon'].includes(tag);
            const el = isSVG
                ? document.createElementNS("http://www.w3.org/2000/svg", tag)
                : document.createElement(tag);

            const { children, style, className, onClick, ...attrs } = props;

            if (className) el.setAttribute('class', className);
            if (style) el.style.cssText = style;
            if (onClick) el.addEventListener('click', onClick);

            Object.keys(attrs).forEach(key => el.setAttribute(key, attrs[key]));

            if (children) {
                children.forEach(child => {
                    if (!child) return;
                    if (Array.isArray(child)) {
                        el.appendChild(genUI(...child));
                    } else if (typeof child === 'string' || typeof child === 'number') {
                        if (String(child).startsWith('<svg')) {
                            el.insertAdjacentHTML('beforeend', child);
                        } else {
                            el.appendChild(document.createTextNode(child));
                        }
                    } else if (child instanceof Node) {
                        el.appendChild(child);
                    }
                });
            }
            return el;
        }

                                                children: [
                                                    ["button", {
                                                        style: "display:inline-flex;align-items:center;justify-content:center;gap:.5rem;white-space:nowrap;font-size:1.075rem;line-height:1.45rem;font-weight:500;transition-property:color,background-color,border-color,text-decoration-color,fill,stroke;transition-timing-function:cubic-bezier(.4,0,.2,1);transition-duration:.15s;width:2.25rem;height:2.25rem;border-radius:9999px;border-width:0;-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);--tw-shadow:0 10px 15px -3px rgb(0 0 0/0.1),0 4px 6px -4px rgb(0 0 0/0.1);--tw-shadow-colored:0 10px 15px -3px var(--tw-shadow-color),0 4px 6px -4px var(--tw-shadow-color);box-shadow:var(--tw-ring-offset-shadow,0 0 #0000),var(--tw-ring-shadow,0 0 #0000),var(--tw-shadow);will-change:transform;background-color:rgb(0 0 0/.3);color:rgb(255 255 255/1)",
                                                        className: "focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 hover:text-accent-foreground hover:bg-black/50",
                                                        onClick: () => {window.scrollTo({ top: 0, behavior: "instant" })},
                                                        children: [Icon("m5 12 7-7 7 7 M12 19V5", "1.25rem")]
                                                    }],
                                                    ["button", {
                                                        style: "display:inline-flex;align-items:center;justify-content:center;gap:.5rem;white-space:nowrap;font-size:1.075rem;line-height:1.45rem;font-weight:500;transition-property:color,background-color,border-color,text-decoration-color,fill,stroke;transition-timing-function:cubic-bezier(.4,0,.2,1);transition-duration:.15s;width:2.25rem;height:2.25rem;border-radius:9999px;border-width:0;-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);--tw-shadow:0 10px 15px -3px rgb(0 0 0/0.1),0 4px 6px -4px rgb(0 0 0/0.1);--tw-shadow-colored:0 10px 15px -3px var(--tw-shadow-color),0 4px 6px -4px var(--tw-shadow-color);box-shadow:var(--tw-ring-offset-shadow,0 0 #0000),var(--tw-ring-shadow,0 0 #0000),var(--tw-shadow);will-change:transform;background-color:rgb(0 0 0/.3);color:rgb(255 255 255/1)",
                                                        className: "focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 hover:text-accent-foreground hover:bg-black/50",
                                                        onClick: () => {
                                                            const endAnchor = document.getElementById('chapter-end-anchor');
                                                            endAnchor ? endAnchor.scrollIntoView({
                                                                behavior: "instant", block: "start"
                                                            }) : window.scrollTo({
                                                                top: document.documentElement.scrollHeight, behavior: "instant"
                                                            })
                                                        },
                                                        children: [Icon("m19 12-7 7-7-7 M12 5v14", "1.25rem")]
                                                    }]
                                                ]
                                            }],
                                        ]
                                    }]
                                ]
                            }]
                        ]
                    }]
                ]
            });
            root.appendChild(layout);
            startHybridLoad().then(() => {
                // Setelah gambar mulai diload, jalankan tracker halaman
                setupPageTracker();
            });
            setTimeout(() => {
                window.scrollTo({ top: CONFIG.y, behavior: 'instant' });
            }, 500);
        };

        // --- 5. INTERACTION LOGIC ---
        const handleNavigation = (event) => {
            // Abaikan jika klik di tombol atau menu
            if (event.target.closest('button') || event.target.closest('#chapters-container')) return;

            const x = event.clientX;
            const width = window.innerWidth;
            const scrollAmount = window.innerHeight * 0.8;

            if (x < 0.3 * width) {
                window.scrollBy({ top: -scrollAmount, behavior: 'smooth' });
            } else if (x > 0.7 * width) {
                window.scrollBy({ top: scrollAmount, behavior: 'smooth' });
            } else {
                const uic = document.getElementById('ui-chapters');
                uic.classList.toggle('-translate-y-16');
                const uia = document.getElementById('ui-arrows');
                uia.classList.toggle('translate-x-16');
            }
        };

        function setupPageTracker() {
            const pageObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // Jika halaman tersebut terlihat lebih dari 50% di layar
                    if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
                        const pageNum = entry.target.getAttribute('data-page-index');
                        CONFIG.lastSeenPage = parseInt(pageNum);
                        
                        // Simpan ke localStorage setiap kali halaman berubah
                        // saveProgress();
                    }
                });
            }, { threshold: 0.5 }); // Deteksi saat 50% elemen muncul

            // Amati semua div yang membungkus gambar
            document.querySelectorAll('[id^="page-"]').forEach(div => {
                pageObserver.observe(div);
            });
        }
        function saveProgress() {
            const slug = $.getSearchObject()['slug'];
            if (!slug) return;

            const data = {
                current: CONFIG.current,      // Chapter ke berapa
                y: window.scrollY,            // Posisi scroll pixel
                page: CONFIG.lastSeenPage     // Halaman ke berapa
            };

            localStorage.setItem(`progress_${slug}`, JSON.stringify(data));
        }

        async function startHybridLoad() {
            const priorityImages = document.querySelectorAll('.manga-page.priority');
            const lazyImages = document.querySelectorAll('.manga-page.lazy');

            // 1. Load 5 gambar pertama secara berurutan (Sequential)
            for (const img of priorityImages) {
                await new Promise((resolve) => {
                    img.onload = () => {
                        img.style.opacity = "1";
                        resolve();
                    };
                    img.onerror = () => resolve(); // Tetap lanjut jika 1 gambar mati
                    img.src = img.getAttribute('data-src');
                });
            }

            // // 2. Setup Intersection Observer untuk sisanya (Lazy Load)
            // const observer = new IntersectionObserver((entries, obs) => {
            //     entries.forEach(entry => {
            //         if (entry.isIntersecting) {
            //             const img = entry.target;
            //             img.src = img.getAttribute('data-src');
            //             img.onload = () => img.style.opacity = "1";
            //             obs.unobserve(img);
            //         }
            //     });
            // }, { rootMargin: '1000px' }); // Load 1000px sebelum muncul di layar

            // lazyImages.forEach(img => observer.observe(img));
        }

        // --- 6. START ---
        const slug = $.getSearchObject()['slug'];
        const saved = localStorage.getItem(`progress_${slug}`);

        fetch(`./${slug}.json`)
        .then(r=>r.ok ? r.json() : Promise.reject(`HTTP error! status: ${r.status}`))
        .then(j=>{
            CONFIG.total = j.length -1;
            CONFIG.chap_imgs = j;

            if (saved) {
                const p = JSON.parse(saved);
                CONFIG.current = p.current; // Set chapter terakhir
                CONFIG.lastSeenPage = p.page;
                CONFIG.y = p.y;
                document.body.style.minHeight = `${CONFIG.y}`
            }
            renderApp();

            const uiChapter = document.getElementById('ui-chapters');
            const uiArrows = document.getElementById('ui-arrows');
            const endAnchor = document.getElementById('chapter-end-anchor');
            let lastScrollY = window.scrollY;
            window.addEventListener('scroll', () => {
                const currentScrollY = window.scrollY;
                (currentScrollY > lastScrollY && currentScrollY > 50 && currentScrollY+window.innerHeight+50 <= endAnchor.offsetTop)
                ? (
                    uiChapter.classList.add('-translate-y-16'),
                    uiArrows.classList.add('translate-x-16')
                ) : (
                    uiChapter.classList.remove('-translate-y-16'),
                    uiArrows.classList.remove('translate-x-16')
                );
                lastScrollY = currentScrollY;
                saveProgress()
            });
            document.addEventListener('click', handleNavigation);
        })
        .catch(e=>console.error('Failed to fetch JSON:',e));
    </script>
</body>
</html>
